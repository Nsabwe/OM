<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OurchatLC</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #004d00; /* dark green background */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      color: white;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 40px;
      text-align: center;
    }

    .loading-percentage {
      font-size: 64px;
      font-weight: bold;
    }

    .start-button {
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background-color: #004d00; /* dark green button */
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s ease-in-out;
      margin-top: 30px;
    }

    .start-button:hover {
      transform: scale(1.05);
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #004d00; /* dark green overlay */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease;
      z-index: 9999;
    }

    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>

  <h1>OurChat</h1>
  <button class="start-button" onclick="startLoading()">Start</button>

  <div class="loading-overlay" id="loading">
    <h1>Welcome to OurChat</h1>
    <div class="loading-percentage" id="loadingPercentage">0%</div>
  </div>

  <script>
    function startLoading() {
      const loadingScreen = document.getElementById('loading');
      const loadingPercentage = document.getElementById('loadingPercentage');

      loadingScreen.classList.add('active');

      let percent = 0;
      const interval = setInterval(() => {
        percent++;
        loadingPercentage.textContent = percent + '%';
        if (percent >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            window.location.href = 'chat.html';
          }, 500);
        }
      }, 30); // ~3 seconds total
    }
  </script>

</body>
</html>
